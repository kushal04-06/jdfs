```html
<!DOCTYPE html>
<html>
<head>
<title>Student ERP System</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#6a0dad,#b084f5);
margin:0;
}

.container{
width:350px;
margin:auto;
margin-top:80px;
background:white;
padding:25px;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:8px;
margin:6px;
}

button{
padding:10px;
width:95%;
background:#6a0dad;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#4b0082;
}

.dashboard{
display:none;
padding:20px;
}

.menu{
background:#6a0dad;
padding:10px;
color:white;
}

.menu button{
margin:5px;
width:auto;
}

.section{
display:none;
padding:20px;
}

</style>

<script>

function showLogin(){
document.getElementById("register").style.display="none";
document.getElementById("login").style.display="block";
}

function showRegister(){
document.getElementById("login").style.display="none";
document.getElementById("register").style.display="block";
}

function login(){
document.getElementById("main").style.display="none";
document.getElementById("dashboard").style.display="block";
}

function logout(){
document.getElementById("dashboard").style.display="none";
document.getElementById("main").style.display="block";
}

function showSection(id){

var sections=document.getElementsByClassName("section");

for(var i=0;i<sections.length;i++){
sections[i].style.display="none";
}

document.getElementById(id).style.display="block";

}

</script>

</head>

<body>

<div id="main">

<!-- LOGIN -->

<div class="container" id="login">

<h2>Student ERP Login</h2>

<input type="text" placeholder="Username or Email"><br>
<input type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<br><br>

<a href="#">Forgot Password?</a>

<br><br>

<a href="#" onclick="showRegister()">Create Account</a>

</div>

<!-- REGISTRATION -->

<div class="container" id="register" style="display:none;">

<h2>Student Registration</h2>

<input type="text" placeholder="Full Name"><br>
<input type="email" placeholder="Email"><br>
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>

<button onclick="showLogin()">Register</button>

<br><br>

<a href="#" onclick="showLogin()">Back to Login
```
